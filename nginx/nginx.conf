# =========================================================
# AttackFlow — nginx reverse proxy
#
# Arquitectura:
#   Internet → nginx:443 (TLS) → daphne:8000 (ASGI)
#   Internet → nginx:80         → redirect 301 a HTTPS
#
# Maneja:
#   /static/  — servido localmente desde el volumen staticfiles
#   /media/   — servido localmente desde el volumen media
#   /ws/      — proxy WebSocket con Upgrade header (Django Channels)
#   /         — proxy HTTP a Daphne
#
# TLS:
#   Coloca fullchain.pem y privkey.pem en nginx/certs/
#   (Let's Encrypt, ZeroSSL, o autofirmado para testing)
#   Ver: nginx/generate_cert.sh para autofirmado rápido
# =========================================================

upstream daphne {
    server web:8000;
    keepalive 32;
}

# ── Redirigir todo HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge para Let's Encrypt (renovación automática)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ── TLS ─────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP Stapling (requiere que ssl_certificate tenga la cadena completa)
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ────────────────────────────────────────────
    # HSTS: el browser recordará HTTPS durante 1 año
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # ── Tamaño de requests ──────────────────────────────────────────
    client_max_body_size 20M;

    # ── Archivos estáticos — servidos directamente por nginx ────────
    location /static/ {
        alias /staticfiles/;
        expires     30d;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        gzip_static on;
    }

    location /media/ {
        alias /media/;
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── WebSocket — Django Channels ─────────────────────────────────
    # La clave es el header "Upgrade: websocket" + "Connection: upgrade".
    # proxy_read_timeout alto para mantener la conexión WS abierta.
    location /ws/ {
        proxy_pass         http://daphne;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Mantener WS vivo hasta 24h (para targets live de 5s)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }

    # ── Django app (HTTP) ────────────────────────────────────────────
    location / {
        proxy_pass         http://daphne;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";   # keepalive hacia Daphne
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Buffering — desactivar para streaming/SSE (si se añade en el futuro)
        # proxy_buffering off;
    }

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;
}
