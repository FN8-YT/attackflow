worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Compresión gzip para assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Oculta versión de Nginx en cabeceras
    server_tokens off;

    # ─── Cabeceras de seguridad comunes ───────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"            always;
    add_header Referrer-Policy         "same-origin"     always;

    # ─── Upstream: Gunicorn ───────────────────────────────────────
    upstream django {
        server web:8000;
        keepalive 32;
    }

    # ─── HTTP → redirige a HTTPS (excepto el challenge de Certbot) ─
    server {
        listen 80;
        server_name _;   # reemplaza con tu dominio al configurar SSL

        # Challenge de Let's Encrypt (debe responder en HTTP).
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Todo lo demás → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS principal ──────────────────────────────────────────
    # Este bloque solo funciona tras obtener el certificado SSL.
    # Antes de tener SSL, comenta este bloque y trabaja solo con HTTP.
    server {
        listen 443 ssl;
        http2  on;
        server_name tudominio.com www.tudominio.com;   # ← cambia esto

        # Certificados SSL (generados por Certbot)
        ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;

        # Configuración TLS moderna (TLS 1.2+ únicamente)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;

        # HSTS: el navegador solo usará HTTPS durante 1 año
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Archivos estáticos: servidos directamente por Nginx ──
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Proxy a Gunicorn ─────────────────────────────────────
        location / {
            proxy_pass         http://django;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }
}
