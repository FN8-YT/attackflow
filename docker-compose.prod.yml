# =========================================================
# docker-compose PRODUCCIÓN
#
# Diferencias clave respecto a dev:
#  - Sin bind-mounts de código fuente (usa la imagen compilada).
#  - Sin watchmedo: los procesos son directos y estables.
#  - Sin Mailpit: email real por SMTP (Resend).
#  - Nginx como reverse proxy que sirve también los estáticos.
#  - collectstatic se ejecuta en el paso de migrate.
#  - restart: unless-stopped en todos los servicios críticos.
#  - Gunicorn con workers ajustados a la RAM del VPS.
# =========================================================

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No exponemos el puerto a internet: solo accesible dentro de la red Docker.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "900", "1", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Migra la BD y recoge estáticos antes de arrancar la web.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear"
    env_file: .env.prod
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    # 2 workers por CPU + 1 (VPS CX22 = 2 vCPU → 3 workers está en el Dockerfile CMD).
    # Si tienes más RAM, sube --workers. Regla: (2 × CPUs) + 1.
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # No exponemos el puerto 8000 directamente: solo Nginx habla con Gunicorn.
    expose:
      - "8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A config worker
        --loglevel=info
        --concurrency=2
        --max-tasks-per-child=500
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A config beat
        --loglevel=info
        --scheduler celery.beat:PersistentScheduler
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - celerybeat_data:/app/celerybeat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - certbot_www:/var/www/certbot:ro        # challenge de Let's Encrypt
      - certbot_conf:/etc/letsencrypt:ro       # certificados SSL
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  celerybeat_data:
  certbot_www:
  certbot_conf:
