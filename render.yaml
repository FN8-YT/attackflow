# render.yaml — Blueprint de infraestructura para Render.com
# SECRETS: nunca pongas valores secretos aquí. Usa sync:false y añádelos
# en el dashboard de Render manualmente.

services:

  - type: web
    name: attackflow-web
    env: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /accounts/login/
    dockerContext: .
    dockerfilePath: ./Dockerfile
    preDeployCommand: "python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: attackflow-web.onrender.com
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: attackflow-db
          property: connectionString
      - key: POSTGRES_DB
        fromDatabase:
          name: attackflow-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: attackflow-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: attackflow-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: attackflow-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: attackflow-db
          property: port
      - key: REDIS_URL
        sync: false
      - key: EMAIL_HOST
        value: smtp.resend.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: resend
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "AttackFlow <noreply@attackflow-web.onrender.com>"
      - key: DISABLE_PLAN_LIMITS
        value: "False"

  - type: worker
    name: attackflow-worker
    env: docker
    plan: starter
    region: frankfurt
    dockerContext: .
    dockerfilePath: ./Dockerfile.worker
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: attackflow-db
          property: connectionString
      - key: POSTGRES_DB
        fromDatabase:
          name: attackflow-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: attackflow-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: attackflow-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: attackflow-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: attackflow-db
          property: port
      - key: REDIS_URL
        sync: false
      - key: EMAIL_HOST
        value: smtp.resend.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: resend
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "AttackFlow <noreply@attackflow-web.onrender.com>"

databases:
  - name: attackflow-db
    plan: free
    databaseName: attackflow
    user: attackflow
    region: frankfurt
